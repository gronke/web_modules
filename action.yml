# Composite action: build a deployable web_modules dist with `web-modules build` — vendor npm into
# web_modules/, transform TypeScript, compile SCSS, copy static files, and render index.html with the
# import map injected. No Node, no bundler.
#
# Build-only by design. To publish, compose it in your own job with the official actions — e.g. for
# GitHub Pages (set the job's permissions + environment):
#
#   jobs:
#     deploy:
#       runs-on: ubuntu-latest
#       permissions: { pages: write, id-token: write }
#       environment: { name: github-pages, url: "${{ steps.pages.outputs.page_url }}" }
#       steps:
#         - uses: actions/checkout@v6
#         - uses: gronke/rust-web_modules@v0
#           with: { packages: "lit@^3", mount: /your-repo/web_modules }
#         - uses: actions/configure-pages@v5
#         - uses: actions/upload-pages-artifact@v5
#           with: { path: dist }
#         - id: pages
#           uses: actions/deploy-pages@v5
#
# By default the action DOWNLOADS a prebuilt `web-modules` binary matching the runner's OS/arch
# (Linux x86_64/arm64, macOS arm64) from the GitHub Releases of gronke/rust-web_modules. On other
# platforms, or to build a specific source tree, set `from-source: true` (compiles with cargo).
#
# Lives at the repo root for the clean `uses: gronke/rust-web_modules@v0`; it is NOT packaged into the
# crate (Cargo.toml's explicit `include` lists only src/Cargo.toml/README/LICENSE). The caller checks
# out its own repo first; this action builds from that working directory.
name: web-modules build
description: Vendor npm + transform TS + compile SCSS + render index.html (import map injected) into dist/. Pure Rust, no Node.
branding:
  icon: package
  color: purple

inputs:
  src:
    description: Source directory (TypeScript, SCSS, HTML and other static files).
    required: false
    default: web
  out:
    description: Output (dist) directory.
    required: false
    default: dist
  mount:
    description: >-
      URL prefix the vendored modules are served at. For a GitHub *project* page served under
      /<repo>/, pass /<repo>/web_modules.
    required: false
    default: /web_modules
  packages:
    description: 'Space-separated package specs to vendor, e.g. "lit@^3 bootstrap@^5". Optional when `manifest` is set.'
    required: false
    default: ""
  manifest:
    description: A package.json file - or a directory containing one - whose `dependencies` are also vendored.
    required: false
    default: ""
  html:
    description: >-
      Inline index.html; the literal {importmap} is replaced with the import-map <script>. Keep entry
      scripts RELATIVE (./app.js) so the page works under a subpath. Leave empty for the built-in
      default, or set `template` to render a Tera template instead.
    required: false
    default: ""
  template:
    description: A Tera template file (rendered with an `importmap` variable) used instead of `html`.
    required: false
    default: ""
  minify:
    description: Minify the emitted JS (true/false).
    required: false
    default: "false"
  gzip:
    description: Write .gz sidecars next to assets (true/false). The released binary includes the `compress` feature, so this works.
    required: false
    default: "false"
  version:
    description: >-
      Which released `web-modules` to download (a version like 0.3 / 0.3.1, a tag like v0.3.1, or
      `edge`). Empty (default) downloads the latest release. Ignored when `from-source: true`.
    required: false
    default: ""
  from-source:
    description: >-
      Build `web-modules` from this action's own source tree with cargo instead of downloading a
      prebuilt binary (needed on platforms without a published binary, or to build an exact ref). No
      build cache is bundled — wrap the action with actions/cache on ~/.cargo if you want one.
    required: false
    default: "false"

outputs:
  dist:
    description: Path to the built dist directory (echoes `out`).
    value: ${{ inputs.out }}

runs:
  using: composite
  steps:
    # 1. Put a `web-modules` binary on PATH — download a prebuilt one (default) or build from source.
    - name: Get web-modules
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        FROM_SOURCE: ${{ inputs.from-source }}
      run: |
        set -euo pipefail
        repo="gronke/rust-web_modules"

        if [ "$FROM_SOURCE" = "true" ]; then
          # Build from the action's own checked-out source ($GITHUB_ACTION_PATH). `--locked` uses the
          # committed Cargo.lock; `full` = the complete lean toolchain (cli + env + compress + …).
          if ! command -v cargo >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --profile minimal --default-toolchain stable
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
          echo "Building web-modules from source: $GITHUB_ACTION_PATH"
          cargo install --path "$GITHUB_ACTION_PATH" --locked --features full
          exit 0
        fi

        # Map the runner to a release target triple (native builds only).
        os=$(uname -s); arch=$(uname -m)
        case "$os" in
          Linux)  case "$arch" in x86_64|amd64) target=x86_64-unknown-linux-gnu ;; aarch64|arm64) target=aarch64-unknown-linux-gnu ;; *) target="" ;; esac ;;
          Darwin) case "$arch" in arm64|aarch64) target=aarch64-apple-darwin ;; *) target="" ;; esac ;;
          *) target="" ;;
        esac
        if [ -z "$target" ]; then
          echo "::error::no prebuilt web-modules binary for $os/$arch (built: Linux x86_64/arm64, macOS arm64) — set 'from-source: true'"
          exit 1
        fi

        # Resolve the release URL base from `version` (empty → latest).
        if [ -z "$INPUT_VERSION" ]; then
          base="https://github.com/$repo/releases/latest/download"
        else
          case "$INPUT_VERSION" in v*|edge) tag="$INPUT_VERSION" ;; *) tag="v$INPUT_VERSION" ;; esac
          base="https://github.com/$repo/releases/download/$tag"
        fi

        asset="web-modules-$target"
        dir="$HOME/.web-modules/bin"; mkdir -p "$dir"; bin="$dir/web-modules"
        echo "Downloading $base/$asset"
        if ! curl -fsSL "$base/$asset" -o "$bin"; then
          echo "::error::could not download $base/$asset — check the version, or set 'from-source: true'"
          exit 1
        fi
        # Verify the sha256 sidecar (sha256sum on Linux, shasum on macOS).
        if curl -fsSL "$base/$asset.sha256" -o "$bin.sha256"; then
          expected=$(awk '{print $1}' "$bin.sha256")
          if command -v sha256sum >/dev/null 2>&1; then actual=$(sha256sum "$bin" | awk '{print $1}'); else actual=$(shasum -a 256 "$bin" | awk '{print $1}'); fi
          if [ "$expected" != "$actual" ]; then
            echo "::error::checksum mismatch for $asset (expected $expected, got $actual)"; exit 1
          fi
        fi
        chmod +x "$bin"
        echo "$dir" >> "$GITHUB_PATH"
        "$bin" --version

    # 2. Build. Config flows in as WEB_MODULES_* environment variables (the `env` feature reads them);
    #    genuinely-optional inputs go on the command line, and only when non-empty — clap treats an
    #    empty env var as a provided empty value, which would inject a stray spec/path. `manifest`
    #    accepts a package.json file OR a directory containing one (resolved here).
    - name: web-modules build
      shell: bash
      env:
        WEB_MODULES_SRC: ${{ inputs.src }}
        WEB_MODULES_OUT: ${{ inputs.out }}
        WEB_MODULES_MOUNT: ${{ inputs.mount }}
        WEB_MODULES_MINIFY: ${{ inputs.minify }}
        WEB_MODULES_GZIP: ${{ inputs.gzip }}
        INPUT_PACKAGES: ${{ inputs.packages }}
        INPUT_MANIFEST: ${{ inputs.manifest }}
        INPUT_TEMPLATE: ${{ inputs.template }}
        INPUT_HTML: ${{ inputs.html }}
      run: |
        args=()
        manifest="$INPUT_MANIFEST"
        if [ -n "$manifest" ]; then
          if [ -d "$manifest" ]; then manifest="${manifest%/}/package.json"; fi
          if [ ! -f "$manifest" ]; then
            echo "::error::manifest not found: $manifest (pass a package.json file or a directory containing one)"
            exit 1
          fi
          args+=(--manifest "$manifest")
        fi
        if [ -n "$INPUT_TEMPLATE" ]; then args+=(--template "$INPUT_TEMPLATE"); fi
        if [ -n "$INPUT_HTML" ]; then args+=(--html "$INPUT_HTML"); fi
        pkgs=()
        if [ -n "$INPUT_PACKAGES" ]; then read -ra pkgs <<< "$INPUT_PACKAGES"; fi
        web-modules build "${args[@]}" "${pkgs[@]}"
