# Build and publish the `web-modules` CLI binary for each supported target on a release tag, so the
# `web-modules build` GitHub Action (root action.yml) can download a prebuilt binary instead of
# compiling from source. Native runners only — no cross-compilation. (release.yml runs the separate
# crates.io publish dry-run on the same tag.)
name: release-binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create/update the GitHub Release and upload the binaries

jobs:
  build:
    name: ${{ matrix.slug }}
    runs-on: ${{ matrix.runner }}
    # Only real X.Y.Z release tags build/publish; a bare-major tag push (e.g. a manual `v0`) no-ops
    # here — defense-in-depth, since CI manages `v0` via GITHUB_TOKEN, which never re-triggers anyway.
    if: ${{ contains(github.ref_name, '.') }}
    # windows-arm64 is newly added and can't be exercised until a real release; tolerate its failure
    # so a hiccup there never blocks the rest of the release. The action falls back to the x86_64
    # build (run under x64 emulation) when no native arm64 binary is published.
    continue-on-error: ${{ matrix.slug == 'windows-arm64' }}
    strategy:
      fail-fast: false
      # One native runner per target (no cross-compilation). `slug` is the friendly release-asset
      # suffix; `ext` is the executable extension (Windows only); the trailing comment is the Rust
      # triple built natively on that runner.
      matrix:
        include:
          - { slug: linux-x86_64,   runner: ubuntu-latest }              # x86_64-unknown-linux-gnu
          - { slug: linux-arm64,    runner: ubuntu-24.04-arm }           # aarch64-unknown-linux-gnu
          - { slug: macos-arm64,    runner: macos-26 }                   # aarch64-apple-darwin (latest)
          - { slug: macos-x86_64,   runner: macos-26-intel }             # x86_64-apple-darwin (Intel, latest)
          - { slug: windows-x86_64, runner: windows-latest, ext: .exe }  # x86_64-pc-windows-msvc
          - { slug: windows-arm64,  runner: windows-11-arm, ext: .exe }  # aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v7

      # windows-11-arm ships no Rust (actions/partner-runner-images#77); every other runner has one
      # preinstalled. The shared cicd-rust action bootstraps the arch-appropriate rustup when none is
      # present (a no-op otherwise) — consistent with ci.yml's use of cicd-rust's rust-cache.
      - name: Ensure Rust toolchain (windows-11-arm ships none)
        if: ${{ matrix.slug == 'windows-arm64' }}
        uses: gronke/cicd-rust/.github/actions/install-toolchain@main

      # Build the full lean toolchain (cli + env + compress + icons/dts/i18n/npm/dev; only the heavy
      # `bundle`/rolldown is excluded) in release mode, reproducibly — `--locked` uses the committed
      # Cargo.lock. Native build: the runner's host == the target, so no `--target` / cross-compile.
      - name: Build
        run: cargo build --release --locked --bin web-modules --features full

      # Stage the binary as web-modules-<slug>[.exe]. Checksums are published once for the whole
      # release by the `checksums` job below (a single SHA256SUMS), not as per-asset sidecars.
      - name: Package
        shell: bash
        env:
          EXT: ${{ matrix.ext }} # ".exe" on Windows, empty elsewhere (undefined matrix key → "")
        run: |
          set -euo pipefail
          asset="web-modules-${{ matrix.slug }}${EXT}"
          cp "target/release/web-modules${EXT}" "$asset"
          strip "$asset" || true   # no-op when strip is absent or can't handle a Windows PE
          ls -lh "$asset"

      # Attach to the Release for this tag via the GitHub CLI (`gh`, preinstalled on every runner) —
      # an official first-party tool invoked from a run step, so no third-party action is needed.
      # Matrix jobs run concurrently: the first `gh release create` makes the release, the rest hit
      # "already exists" (ignored); each then uploads its own binary (`--clobber` makes re-runs safe).
      # The release body is the annotated tag's own message (`--notes-from-tag`).
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          gh release create "$tag" --title "$tag" --notes-from-tag --verify-tag \
            || echo "release $tag already exists; uploading assets"
          gh release upload "$tag" "web-modules-${{ matrix.slug }}${{ matrix.ext }}" --clobber

  # After every binary is uploaded, publish ONE combined SHA256SUMS for the release; the action
  # downloads it and verifies the line for the single asset it fetched. A combined file (vs. per-asset
  # sidecars) means one thing to sign later, fewer assets, and `sha256sum -c SHA256SUMS` verifies the
  # whole release at once. Generated on one host, so there is no cross-runner write race.
  checksums:
    name: SHA256SUMS
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload SHA256SUMS to the release
    steps:
      - name: Generate + upload SHA256SUMS
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }} # no checkout here, so point gh at the repo explicitly
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          gh release download "$tag" --pattern 'web-modules-*' --dir dl
          ( cd dl && sha256sum web-modules-* ) > SHA256SUMS
          cat SHA256SUMS
          gh release upload "$tag" SHA256SUMS --clobber

  # After the prebuilt binaries + SHA256SUMS are published, (re)create the major tag (e.g. v0) at the
  # highest stable release in its line, so `uses: gronke/web_modules@v0` tracks the newest 0.x.
  # `v0` is intentionally left OUTSIDE the tag-signing ruleset (create/delete allowed, unsigned), so
  # the default GITHUB_TOKEN can manage it; there is no GitHub *Release* named `v0`. Skipped for
  # prereleases. A GITHUB_TOKEN push never re-triggers workflows, so this can't loop.
  major-tag:
    name: recreate major tag
    needs: [build, checksums]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create/delete the unprotected vN tag
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # need full history to verify the release commit is on the default branch
      - name: Recreate the major tag at the highest stable release
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          major="${GITHUB_REF_NAME%%.*}"            # v0.3.1 -> v0
          [ "$major" = "$GITHUB_REF_NAME" ] && { echo "not vMAJOR.MINOR.PATCH; nothing to do"; exit 0; }

          # Highest STABLE major.minor.patch tag in this line (drops prereleases and the bare major).
          git fetch --tags --force origin
          highest=$(git tag --list "${major}.*" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1) || true
          test -n "$highest" || { echo "::error::no stable ${major}.x tag found"; exit 1; }
          target=$(git rev-list -n1 "$highest")

          # Defense-in-depth: only ever point the major tag at a commit on the default branch.
          git fetch --no-tags origin "$DEFAULT_BRANCH"
          git merge-base --is-ancestor "$target" FETCH_HEAD \
            || { echo "::error::$highest ($target) is not on $DEFAULT_BRANCH; refusing"; exit 1; }

          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git push origin ":refs/tags/$major" || true   # delete the old tag (ignore if absent)
          git tag -fa "$major" -m "$major -> $highest" "$target"
          git push origin "refs/tags/$major"
          echo "recreated $major -> $highest ($target)"
