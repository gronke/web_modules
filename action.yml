# Composite action: build a deployable web_modules dist with `web-modules build` — vendor npm into
# web_modules/, transform TypeScript, compile SCSS, copy static files, and render index.html with the
# import map injected. No Node, no bundler.
#
# Build-only by design. To publish, compose it in your own job with the official actions — e.g. for
# GitHub Pages (set the job's permissions + environment):
#
#   jobs:
#     deploy:
#       runs-on: ubuntu-latest
#       permissions: { pages: write, id-token: write }
#       environment: { name: github-pages, url: "${{ steps.pages.outputs.page_url }}" }
#       steps:
#         - uses: actions/checkout@v7
#         - uses: gronke/web_modules@v0
#           with: { packages: "lit@^3", mount: /your-repo/web_modules }
#         - uses: actions/configure-pages@v6
#         - uses: actions/upload-pages-artifact@v5
#           with: { path: dist }
#         - id: pages
#           uses: actions/deploy-pages@v5
#
# By default the action DOWNLOADS a prebuilt `web-modules` binary matching the runner's OS/arch
# (Linux x86_64/arm64, macOS arm64/x86_64, Windows x86_64/arm64) from the GitHub Releases of
# gronke/web_modules. On other platforms, or to build a specific source tree, set
# `from-source: true` (compiles with cargo).
#
# Lives at the repo root for the clean `uses: gronke/web_modules@v0`; it is NOT packaged into the
# crate (Cargo.toml's explicit `include` lists only src/Cargo.toml/README/LICENSE). The caller checks
# out its own repo first; this action builds from that working directory.
name: web-modules build
author: Stefan Grönke
description: Vendor npm + transform TS + compile SCSS + render index.html (import map injected) into dist/. Pure Rust, no Node.
branding:
  icon: package
  color: purple

inputs:
  src:
    description: Source directory (TypeScript, SCSS, HTML and other static files).
    required: false
    default: web
  out:
    description: Output (dist) directory.
    required: false
    default: dist
  mount:
    description: >-
      URL prefix the vendored modules are served at. For a GitHub *project* page served under
      /<repo>/, pass /<repo>/web_modules.
    required: false
    default: /web_modules
  packages:
    description: 'Space-separated package specs to vendor, e.g. "lit@^3 bootstrap@^5". Optional when `manifest` is set.'
    required: false
    default: ""
  manifest:
    description: A package.json file - or a directory containing one - whose `dependencies` are also vendored.
    required: false
    default: ""
  html:
    description: >-
      Inline index.html; the literal {importmap} is replaced with the import-map <script>. Keep entry
      scripts RELATIVE (./app.js) so the page works under a subpath. Leave empty for the built-in
      default, or set `template` to render a Tera template instead.
    required: false
    default: ""
  template:
    description: A Tera template file (rendered with an `importmap` variable) used instead of `html`.
    required: false
    default: ""
  minify:
    description: Minify the emitted JS (true/false).
    required: false
    default: "false"
  gzip:
    description: Write .gz sidecars next to assets (true/false). The released binary includes the `compress` feature, so this works.
    required: false
    default: "false"
  version:
    description: >-
      Which released `web-modules` to download (a version like 0.3 / 0.3.1, a tag like v0.3.1, or
      `edge`). Empty (default): the release matching the action tag you pinned when it is an exact
      version (`uses: …@v0.3.1` → the v0.3.1 binary, reproducible), otherwise the latest release
      (e.g. pinning `@v0`, a branch, or a commit SHA). Ignored when `from-source: true`. The action
      refuses a downloaded binary older than its CLI contract (currently >= 0.4.0).
    required: false
    default: ""
  from-source:
    description: >-
      Build `web-modules` from this action's own source tree with cargo instead of downloading a
      prebuilt binary (needed on platforms without a published binary, or to build an exact ref). No
      build cache is bundled — wrap the action with actions/cache on ~/.cargo if you want one.
    required: false
    default: "false"

outputs:
  dist:
    description: Path to the built dist directory (echoes `out`).
    value: ${{ inputs.out }}

runs:
  using: composite
  steps:
    # 1. Put a `web-modules` binary on PATH — download a prebuilt one (default) or build from source.
    - name: Get web-modules
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        FROM_SOURCE: ${{ inputs.from-source }}
        ACTION_REF: ${{ github.action_ref }} # the ref the caller pinned: v0.3.1 / v0 / branch / SHA
      run: |
        set -euo pipefail
        repo="gronke/web_modules"

        if [ "$FROM_SOURCE" = "true" ]; then
          # Build from the action's own checked-out source ($GITHUB_ACTION_PATH). `--locked` uses the
          # committed Cargo.lock; `full` = the complete lean toolchain (cli + env + compress + …).
          if ! command -v cargo >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --profile minimal --default-toolchain stable
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
          echo "Building web-modules from source: $GITHUB_ACTION_PATH"
          cargo install --path "$GITHUB_ACTION_PATH" --locked --features full
          exit 0
        fi

        # Map the runner to a release asset slug (native targets only). On Windows, `uname` runs
        # under the Actions git-bash; its `uname -m` is unreliable under x64 emulation, so read the
        # true machine arch from Windows' own PROCESSOR_ARCHITE(W6432) variables.
        os=$(uname -s); arch=$(uname -m)
        case "$os" in
          Linux)  case "$arch" in x86_64|amd64) slug=linux-x86_64 ;; aarch64|arm64) slug=linux-arm64 ;; *) slug="" ;; esac ;;
          Darwin) case "$arch" in arm64|aarch64) slug=macos-arm64 ;; x86_64) slug=macos-x86_64 ;; *) slug="" ;; esac ;;
          MINGW*|MSYS*|CYGWIN*)
            winarch="${PROCESSOR_ARCHITEW6432:-${PROCESSOR_ARCHITECTURE:-$arch}}"
            case "$winarch" in
              ARM64|arm64|aarch64) slug=windows-arm64 ;;
              AMD64|x86_64|amd64)  slug=windows-x86_64 ;;
              *) slug="" ;;
            esac ;;
          *) slug="" ;;
        esac
        if [ -z "$slug" ]; then
          echo "::error::no prebuilt web-modules binary for $os/$arch (built: Linux x86_64/arm64, macOS arm64/x86_64, Windows x86_64/arm64) — set 'from-source: true'"
          exit 1
        fi
        ext=""; case "$slug" in windows-*) ext=".exe" ;; esac # Windows carries .exe on disk + asset

        # Resolve which release to download. Precedence:
        #   1. an explicit `version` input (unchanged — includes the `edge` channel);
        #   2. else, if the caller pinned an EXACT vMAJOR.MINOR.PATCH action ref, match it, so
        #      `uses: …@v0.3.1` fetches the v0.3.1 binary the action code was shipped with (repro);
        #   3. else (a moving major like v0, a branch, or a commit SHA) → the latest release. A
        #      moving `v0` tag has no Release of its own, so it MUST fall through to latest here.
        ver="$INPUT_VERSION"
        if [ -z "$ver" ]; then
          case "$ACTION_REF" in
            v[0-9]*.[0-9]*.[0-9]*) ver="$ACTION_REF" ;; # v0.3.1, v0.3.1-rc1 → pin
            *) ver="" ;;                                # v0 / branch / SHA → latest
          esac
        fi
        if [ -z "$ver" ]; then
          base="https://github.com/$repo/releases/latest/download"
        else
          case "$ver" in v*|edge) tag="$ver" ;; *) tag="v$ver" ;; esac
          base="https://github.com/$repo/releases/download/$tag"
        fi

        dir="$HOME/.web-modules/bin"; mkdir -p "$dir"; bin="$dir/web-modules$ext"

        # Assets to try, in order. A native windows-arm64 build is preferred but may be absent (an
        # older release, or its build failed) — fall back to the x86_64 binary, which Windows runs
        # under x64 emulation.
        candidates="$slug"
        if [ "$slug" = "windows-arm64" ]; then candidates="windows-arm64 windows-x86_64"; fi
        asset=""
        for s in $candidates; do
          a="web-modules-$s$ext"
          echo "Downloading $base/$a"
          if curl -fsSL "$base/$a" -o "$bin"; then slug="$s"; asset="$a"; break; fi
        done
        if [ -z "$asset" ]; then
          echo "::error::could not download a web-modules binary from $base (tried: $candidates) — check the version, or set 'from-source: true'"
          exit 1
        fi

        # Verify against the release's combined SHA256SUMS (sha256sum on Linux/git-bash, shasum on
        # macOS). Releases that predate SHA256SUMS simply skip verification (best-effort).
        if curl -fsSL "$base/SHA256SUMS" -o "$dir/SHA256SUMS"; then
          expected=$(awk -v f="$asset" '$2 == f || $2 == "*" f {print $1}' "$dir/SHA256SUMS")
          if [ -z "$expected" ]; then
            echo "::error::no checksum entry for $asset in SHA256SUMS"; exit 1
          fi
          if command -v sha256sum >/dev/null 2>&1; then actual=$(sha256sum "$bin" | awk '{print $1}'); else actual=$(shasum -a 256 "$bin" | awk '{print $1}'); fi
          if [ "$expected" != "$actual" ]; then
            echo "::error::checksum mismatch for $asset (expected $expected, got $actual)"; exit 1
          fi
        fi
        chmod +x "$bin"
        echo "$dir" >> "$GITHUB_PATH"

        # Guard: refuse a downloaded binary too old for this action's CLI contract. Since 0.4.0 the
        # source dir is passed as a POSITIONAL root (and packages via `--package`); a pre-0.4.0 binary
        # reads that positional as a package spec and fails later with a confusing npm registry 404
        # (e.g. pinning a moving `@v0` mid-release, before the matching binary has published). Fail
        # fast with an actionable message instead. `from-source` builds from this action's own tree
        # and returned above, so it never reaches here. Pure-bash compare (macOS `sort` has no `-V`).
        MIN_MAJOR=0; MIN_MINOR=4; MIN_PATCH=0
        ver_out="$("$bin" --version)"; echo "$ver_out" # e.g. "web-modules 0.4.0"
        core="${ver_out##* }"; core="${core%%[-+]*}"   # last field, minus any -pre/+meta suffix
        IFS=. read -r maj mnr pat <<< "$core"; maj="${maj:-0}"; mnr="${mnr:-0}"; pat="${pat:-0}"
        case "$maj$mnr$pat" in
          *[!0-9]*|'')
            echo "::warning::could not parse web-modules version '$ver_out'; skipping the >= $MIN_MAJOR.$MIN_MINOR.$MIN_PATCH check" ;;
          *)
            if [ "$maj" -lt "$MIN_MAJOR" ] \
              || { [ "$maj" -eq "$MIN_MAJOR" ] && [ "$mnr" -lt "$MIN_MINOR" ]; } \
              || { [ "$maj" -eq "$MIN_MAJOR" ] && [ "$mnr" -eq "$MIN_MINOR" ] && [ "$pat" -lt "$MIN_PATCH" ]; }; then
              echo "::error::downloaded web-modules $core is older than this action requires (>= $MIN_MAJOR.$MIN_MINOR.$MIN_PATCH): it passes the source dir as a positional root, which older binaries read as a package name (registry 404). Set a matching 'version:' input, bump the action ref, or use 'from-source: true'."
              exit 1
            fi ;;
        esac

    # 2. Build. The source dir is passed as a positional root and `--out` explicitly; the other
    #    inputs go on the command line only when non-empty (clap treats an empty value as provided).
    #    `manifest` accepts a package.json file OR a directory containing one (resolved here); each
    #    `packages` entry becomes a repeatable `--package`; `minify`/`gzip` are presence flags.
    - name: web-modules build
      shell: bash
      env:
        INPUT_SRC: ${{ inputs.src }}
        INPUT_OUT: ${{ inputs.out }}
        INPUT_MOUNT: ${{ inputs.mount }}
        INPUT_MINIFY: ${{ inputs.minify }}
        INPUT_GZIP: ${{ inputs.gzip }}
        INPUT_PACKAGES: ${{ inputs.packages }}
        INPUT_MANIFEST: ${{ inputs.manifest }}
        INPUT_TEMPLATE: ${{ inputs.template }}
        INPUT_HTML: ${{ inputs.html }}
      run: |
        # Fail clearly on a missing source dir — almost always a forgotten actions/checkout or a
        # wrong `src` — rather than surfacing a lower-level error from the binary.
        if [ ! -d "$INPUT_SRC" ]; then
          echo "::error::source directory not found: '$INPUT_SRC' (did the job run actions/checkout first, or is the 'src' input wrong?)"
          exit 1
        fi
        args=(--out "$INPUT_OUT" --mount "$INPUT_MOUNT")
        manifest="$INPUT_MANIFEST"
        if [ -n "$manifest" ]; then
          if [ -d "$manifest" ]; then manifest="${manifest%/}/package.json"; fi
          if [ ! -f "$manifest" ]; then
            echo "::error::manifest not found: $manifest (pass a package.json file or a directory containing one)"
            exit 1
          fi
          args+=(--manifest "$manifest")
        fi
        if [ -n "$INPUT_TEMPLATE" ]; then args+=(--template "$INPUT_TEMPLATE"); fi
        if [ -n "$INPUT_HTML" ]; then args+=(--html "$INPUT_HTML"); fi
        # Booleans → presence flags. `--minify` / `--gzip` are CLI-only now; the released binary
        # carries the `compress` feature, so `--gzip` works.
        case "$INPUT_MINIFY" in 1 | true | yes | on) args+=(--minify) ;; esac
        case "$INPUT_GZIP" in 1 | true | yes | on) args+=(--gzip) ;; esac
        # Each package spec becomes a repeatable `--package`.
        if [ -n "$INPUT_PACKAGES" ]; then
          read -ra pkgs <<< "$INPUT_PACKAGES"
          for p in "${pkgs[@]}"; do args+=(--package "$p"); done
        fi
        # The source dir is a positional root.
        web-modules build "$INPUT_SRC" "${args[@]}"

        # Best-effort job summary of what was built (never fail the build over it). find/du/wc are
        # available on every supported runner, incl. Windows git-bash.
        {
          echo "### web-modules build"
          echo ""
          echo "| input | value |"
          echo "| --- | --- |"
          echo "| src → out | \`$INPUT_SRC\` → \`$INPUT_OUT\` |"
          echo "| mount | \`$INPUT_MOUNT\` |"
          [ -n "$INPUT_PACKAGES" ] && echo "| packages | \`$INPUT_PACKAGES\` |"
          [ -n "$manifest" ] && echo "| manifest | \`$manifest\` |"
          [ -n "$INPUT_TEMPLATE" ] && echo "| template | \`$INPUT_TEMPLATE\` |"
          echo "| minify · gzip | \`$INPUT_MINIFY\` · \`$INPUT_GZIP\` |"
          echo ""
          if [ -d "$INPUT_OUT" ]; then
            files=$(find "$INPUT_OUT" -type f | wc -l | tr -d ' ')
            size=$(du -sh "$INPUT_OUT" 2>/dev/null | cut -f1)
            echo "Built **$files** files into \`$INPUT_OUT/\` (**$size**)."
          fi
        } >> "$GITHUB_STEP_SUMMARY" || true
