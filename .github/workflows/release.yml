name: release readiness

# Runs when a signed release tag (v*) is pushed — just before a `cargo publish`. Confirms the
# crate packages + publishes cleanly (dry-run, no upload) and verifies the declared MSRV. Kept out of
# the per-PR CI: the verify build is heavy (it is what used to exhaust the runner's disk there)
# and only matters at release time. Isolated runner → no shared cache, no zstd needed.
on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

# Least-privilege: the dry-run only reads the repo (package + publish --dry-run to crates.io); no write.
permissions:
  contents: read

jobs:
  publish-dry-run:
    name: publish dry-run · MSRV
    runs-on: ubuntu-latest
    # Skip a bare-major tag push (e.g. a manual `v0`); only real X.Y.Z tags warrant the dry-run.
    if: ${{ contains(github.ref_name, '.') }}
    steps:
      - uses: actions/checkout@v7

      # The dry-run below cannot catch an un-bumped version - crates.io rejects a duplicate
      # only on the real upload. Fail fast when the tag and the manifest disagree.
      # `--no-deps` reads the manifests without resolving, so a stale Cargo.lock cannot mask it.
      - name: Tag matches the crate version
        run: |
          crate="$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "web_modules") | .version')"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$crate" != "$tag" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} but Cargo.toml says ${crate} - bump the version before tagging"
            exit 1
          fi

      - name: MSRV check (compiles on the declared rust-version)
        uses: gronke/rust-ci/.github/actions/msrv@main
        with:
          package: web_modules
          features: --features full

      - name: Package contents
        run: cargo package -p web_modules --list

      - name: Publish dry-run
        run: cargo publish -p web_modules --dry-run
